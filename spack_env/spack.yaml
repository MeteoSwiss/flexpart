# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  develop:
    flexpart-ifs:
      spec: flexpart-ifs
      path: ..
  # add package specs to the `specs` list
  specs:
  - flexpart-ifs
  - netcdf-c ~mpi
  - eccodes @2.36.4 +aec jp2k=none
  - hdf5 ~mpi
  view: ../spack-view
  concretizer:
    unify: true
  repos:
    flexpart: ../spack_repo/flexpart
    # For the builtin repo, a newer commit is used that includes
    # eccodes-cosmo-resources, eccodes 2.19.1, and a compiler wrapper bugfix.
    # Once spack 1.2 is released, we can switch back to the default repo.
    # You need to run 'spack repo update' to make this work!
    builtin:
      commit: a5ec6ab0dbf87f671a917bce29bf16284ebf0dac
  config:
    install_tree:
      root: ../spack-root
    # install_path_scheme: '{name}'
